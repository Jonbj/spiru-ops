services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: spiru
      POSTGRES_PASSWORD: spiru
      POSTGRES_DB: spiru_ops
    ports:
      - "5432:5432"
    volumes:
      - ./storage/pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  unstructured:
    image: downloads.unstructured.io/unstructured-io/unstructured-api@sha256:3b9280eb9aa53d76a8f4a2465400ae747774d4bfd71dd73d603353b0b55c435d
    environment:
      - UNSTRUCTURED_LOG_LEVEL=INFO
      - WORKERS=1
    ports:
      - "8000:8000"
    restart: unless-stopped
    shm_size: "1gb"
    tmpfs:
      - /tmp:size=2g
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 20s

  grobid:
    image: lfoppiano/grobid:latest-crf
    ports:
      - "8070:8070"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx2g
    volumes:
      - ./storage/grobid:/opt/grobid/grobid-home/tmp
    mem_limit: 3g